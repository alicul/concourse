global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'concourse-web'
    static_configs:
      - targets: ['web:9090']
        labels:
          component: 'web'
          cluster: 'p2p-multinetwork'

  - job_name: 'workers'
    static_configs:
      - targets:
        - 'worker-s1-a:9090'
        - 'worker-s1-b:9090'
        - 'worker-s2:9090'
        - 'worker-relay:9090'
        - 'worker-isolated:9090'
    relabel_configs:
      - source_labels: [__address__]
        target_label: worker_name
        regex: '([^:]+):.*'
        replacement: '${1}'

  - job_name: 'postgres'
    static_configs:
      - targets: ['db:5432']
        labels:
          component: 'database'

# Alert rules for P2P monitoring
rule_files:
  - '/etc/prometheus/rules/*.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Add alertmanager if needed